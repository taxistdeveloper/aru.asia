<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Технические работы | Aru</title>
    <meta name="robots" content="noindex, nofollow">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            min-height: 100vh;
            background: linear-gradient(180deg, #fff 0%, #f8f9fa 50%, #fff 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            color: #1a1a1a;
        }
        .box {
            text-align: center;
            max-width: 480px;
        }
        .icon {
            font-size: 64px;
            margin-bottom: 24px;
            line-height: 1;
        }
        h1 {
            font-size: 26px;
            font-weight: 700;
            margin-bottom: 16px;
            color: #1a1a1a;
        }
        p {
            font-size: 17px;
            color: #4a5568;
            line-height: 1.6;
        }
        .small {
            margin-top: 24px;
            font-size: 14px;
            color: #718096;
        }
    </style>
</head>
<body>
    <div class="box">
        <div class="icon" aria-hidden="true">&#9881;</div>
        <h1>Идут технические работы</h1>
        <p>Скоро возобновим работу. Пожалуйста, зайдите позже.</p>
        <p class="small">Приносим извинения за неудобства.</p>
    </div>
</body>
</html>
